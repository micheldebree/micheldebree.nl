baseurl = "https://micheldebree.nl"
title = "Michel de Bree"

theme = "hugo-coder"
enableEmoji = true

languagecode = "en"
defaultcontentlanguage = "en"

pagination.PagerSize = 20
canonifyurls = true

pygmentsstyle = "b2"
pygmentscodefences = true
pygmentscodefencesguesssyntax = true

# disqusShortname = "yourdiscussshortname"

[params]
    author = "Michel de Bree"
    description = "Michel de Bree, Experienced Java developer"
    keywords = "developer,freelance,java,javascript,react,spring boot,hibernate,git,linux,docker,kubernetes"
    info = "Experienced Java developer"
    avatarurl = "images/logo.svg"
    footercontent = " "

    dateformat = "January 2, 2006"

    hideCredits = true
    hideCopyright = true

    # Git Commit in Footer, uncomment the line below to enable it.
    # commit = "https://github.com/luizdepra/hugo-coder/tree/"

    rtl = false

    # Specify light/dark colorscheme
    # Supported values:
    # "auto" (use preference set by browser)
    # "dark" (dark background, light foreground)
    # "light" (light background, dark foreground) (default)
    colorscheme = "auto"

    # Series see also post count
    maxSeeAlsoItems = 5

    # Custom CSS
    customCSS = ["css/custom.css"]

[taxonomies]
  category = "categories"
  series = "series"
  tag = "tags"

